<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Card Oficial - Ciclismo</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 22px;
            font-family: Arial, sans-serif;
            color: white;
            overflow-x: hidden;
            background:
                radial-gradient(circle at top, rgba(74, 222, 128, 0.15), transparent 35%),
                radial-gradient(circle at center, rgba(34, 197, 94, 0.1), transparent 55%),
                linear-gradient(180deg, #022c22 0%, #064e3b 45%, #022c22 100%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: clamp(2rem, 8vw, 3.2rem);
            font-weight: 900;
            line-height: 1.15;
            color: #f8fafc;
            text-shadow: 0 0 18px rgba(74, 222, 128, 0.35);
        }

        header p {
            margin-top: 12px;
            color: #bbf7d0;
            font-size: 1.05rem;
            line-height: 1.4;
        }

        .card-box {
            width: 100%;
            padding: 20px;
            border-radius: 28px;
            background: rgba(2, 44, 34, 0.82);
            border: 1px solid rgba(74, 222, 128, 0.28);
            box-shadow: 0 0 35px rgba(22, 163, 74, 0.25);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #nome-corredor {
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(74, 222, 128, 0.35);
            background: rgba(2, 44, 34, 0.95);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        /* Container do Canvas Visual na tela */
        .canvas-container {
            width: 100%;
            aspect-ratio: 9 / 16;
            overflow: hidden;
            border-radius: 20px;
            border: 1px solid rgba(74, 222, 128, 0.35);
            background: #011410;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
            touch-action: none;
        }

        canvas:active {
            cursor: grabbing;
        }

        /* CONTROLES */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-label {
            display: block;
            text-align: center;
            background: #0f172a;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="file"] { display: none; }
        
        .btn-download {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            background: #16a34a;
            color: white;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .btn-download:hover {
            background: #15803d;
        }
        
        .instrucao-arrastar {
            text-align: center;
            font-size: 0.85rem;
            color: #a7f3d0;
            margin: 4px 0;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Gere seu Card Oficial</h1>
        <p>Mova e ajuste sua foto diretamente no card!</p>
    </header>

    <main class="card-box">
        <div class="input-group">
            <input type="text" id="nome-corredor" placeholder="Digite seu nome completo" maxlength="25">
        </div>

        <div class="canvas-container">
            <!-- Um único Canvas nativo cuidando de tudo -->
            <canvas id="cardCanvas"></canvas>
        </div>

        <div class="controls">
            <label class="file-label">
                1. Escolher Foto
                <input type="file" id="input-foto" accept="image/*">
            </label>

            <p class="instrucao-arrastar" id="msg-ajuda" style="display:none;">
                👋 Arraste para mover | ✌️ Use dois dedos ou a roda do mouse para dar Zoom
            </p>

            <button class="btn btn-download" id="btnDownload">2. Baixar Story</button>
        </div>
    </main>
</div>

<script>
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    const inputFoto = document.getElementById('input-foto');
    const nomeCorredor = document.getElementById('nome-corredor');
    const msgAjuda = document.getElementById('msg-ajuda');
    const btnDownload = document.getElementById('btnDownload');

    // Definição HD Fixa do Canvas (Resolução 1080x1920 Proporção de Story)
    const CANVAS_WIDTH = 1080;
    const CANVAS_HEIGHT = 1920;
    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;

    // Imagens fundamentais
    const imgMoldura = new Image();
    imgMoldura.src = 'fundo.png'; // Caminho da sua moldura de fundo
    
    const imgAtleta = new Image();

    // Estado da Foto do Usuário
    let fotoCarregada = false;
    let imgScale = 1.0;
    let imgX = 0;
    let imgY = 0;
    let textNome = "SEU NOME AQUI";

    // Variáveis de Controle de Gestos/Mouse
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let lastPinchDist = 0;

    // Atualiza o canvas quando a moldura carregar
    imgMoldura.onload = () => { drawCard(); };

    // Entrada do Nome
    nomeCorredor.addEventListener('input', (e) => {
        textNome = e.target.value.toUpperCase().trim() || "SEU NOME AQUI";
        drawCard();
    });

    // Entrada do Arquivo de Imagem
    inputFoto.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                imgAtleta.src = event.target.result;
                imgAtleta.onload = function() {
                    fotoCarregada = true;
                    msgAjuda.style.display = 'block';
                    
                    // Centraliza a foto de forma padrão inicial (Modo Cover)
                    const areaW = 907; // 1080 * 0.84
                    const areaH = 787; // 1920 * 0.41
                    imgScale = Math.max(areaW / imgAtleta.naturalWidth, areaH / imgAtleta.naturalHeight);
                    
                    imgX = (CANVAS_WIDTH / 2);
                    imgY = (CANVAS_HEIGHT * 0.63);
                    
                    drawCard();
                }
            }
            reader.readAsDataURL(file);
        }
    });

    // --- FUNÇÃO ADAPTADA: ARREDONDAMENTO NATIVO REQUISITADO ---
    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    // --- MOTOR PRINCIPAL DE DESENHO DO CANVAS (IMPECÁVEL) ---
    function drawCard() {
        // Limpa tudo
        ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        // 1. Desenha o fundo preto base da caixa da foto primeiro
        ctx.fillStyle = "#011410";
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        // 2. Posiciona e Recorta a Foto do Corredor se ela existir
        if (fotoCarregada) {
            ctx.save();
            
            // Dimensões exatas baseadas nos seus parâmetros de 84% de largura e 41% de altura
            const wBox = 907; 
            const hBox = 787;
            const xBox = (CANVAS_WIDTH - wBox) / 2;
            const yBox = (CANVAS_HEIGHT * 0.63) - (hBox / 2);
            
            // Cria a máscara arredondada usando sua função
            drawRoundedRect(ctx, xBox, yBox, wBox, hBox, 42); // 42px de raio em escala real
            ctx.clip();

            // Desenha a imagem baseada nos pontos dinâmicos de arraste e escala
            const wRender = imgAtleta.naturalWidth * imgScale;
            const hRender = imgAtleta.naturalHeight * imgScale;
            
            ctx.drawImage(imgAtleta, imgX - wRender / 2, imgY - hRender / 2, wRender, hRender);
            ctx.restore();
        }

        // 3. Desenha a moldura por cima da foto (Preservando transparências)
        if (imgMoldura.complete) {
            ctx.drawImage(imgMoldura, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        }

        // 4. Desenha o Texto do Nome com o contorno preto perfeito (Stroked Text)
        ctx.fillStyle = "#ffffff";
        ctx.font = "900 68px Arial"; // Tamanho proporcional HD
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        
        const xTexto = CANVAS_WIDTH / 2;
        const yTexto = CANVAS_HEIGHT - 125; // Equivale aos 55px proporcionais da base

        // Contorno
        ctx.strokeStyle = "#000000";
        ctx.lineWidth = 12;
        ctx.strokeText(textNome, xTexto, yTexto);
        // Preenchimento
        ctx.fillText(textNome, xTexto, yTexto);
    }

    // --- CONTROLE DE MOVIMENTAÇÃO (MOUSE E TOUCH COM ADAPTAÇÃO CANVAS COORDENADAS) ---
    function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: (clientX - rect.left) * (CANVAS_WIDTH / rect.width),
            y: (clientY - rect.top) * (CANVAS_HEIGHT / rect.height)
        };
    }

    function startDrag(e) {
        if (!fotoCarregada) return;
        if (e.touches && e.touches.length === 2) {
            isDragging = false;
            lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            return;
        }
        isDragging = true;
        const coords = getCanvasCoords(e);
        startX = coords.x - imgX;
        startY = coords.y - imgY;
    }

    function moveDrag(e) {
        if (!fotoCarregada) return;
        if (e.touches && e.touches.length === 2) {
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            const factor = dist / lastPinchDist;
            imgScale = Math.min(Math.max(imgScale * factor, 0.1), 6);
            lastPinchDist = dist;
            drawCard();
            return;
        }
        if (!isDragging) return;
        const coords = getCanvasCoords(e);
        imgX = coords.x - startX;
        imgY = coords.y - startY;
        drawCard();
    }

    function stopDrag() { isDragging = false; }

    // Ouvintes Mouse
    canvas.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('mouseup', stopDrag);

    // Ouvintes Touch Screen
    canvas.addEventListener('touchstart', startDrag, { passive: true });
    window.addEventListener('touchmove', moveDrag, { passive: true });
    window.addEventListener('touchend', stopDrag);

    // Zoom via Roda do Mouse (Desktop)
    canvas.addEventListener('wheel', (e) => {
        if (!fotoCarregada) return;
        e.preventDefault();
        const zoomFactor = e.deltaY < 0 ? 1.05 : 0.95;
        imgScale = Math.min(Math.max(imgScale * zoomFactor, 0.1), 6);
        drawCard();
    }, { passive: false });

    // --- FUNÇÃO ADAPTADA DE DOWNLOAD (EXATAMENTE COMO VOCÊ QUERIA) ---
    document.getElementById('btnDownload').onclick = () => {
        if (!fotoCarregada) return alert("Selecione sua foto primeiro!");
        const link = document.createElement('a');
        link.download = 'Desafio_Araras_Story.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    };
</script>
</body>
</html>
