<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Card Oficial - Ciclismo</title>
    <!-- Biblioteca para exportar a div como imagem -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 22px;
            font-family: Arial, sans-serif;
            color: white;
            overflow-x: hidden;
            background:
                radial-gradient(circle at top, rgba(74, 222, 128, 0.15), transparent 35%),
                radial-gradient(circle at center, rgba(34, 197, 94, 0.1), transparent 55%),
                linear-gradient(180deg, #022c22 0%, #064e3b 45%, #022c22 100%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: clamp(2rem, 8vw, 3.2rem);
            font-weight: 900;
            line-height: 1.15;
            color: #f8fafc;
            text-shadow: 0 0 18px rgba(74, 222, 128, 0.35);
        }

        header p {
            margin-top: 12px;
            color: #bbf7d0;
            font-size: 1.05rem;
            line-height: 1.4;
        }

        .card-box {
            width: 100%;
            padding: 20px;
            border-radius: 28px;
            background: rgba(2, 44, 34, 0.82);
            border: 1px solid rgba(74, 222, 128, 0.28);
            box-shadow: 0 0 35px rgba(22, 163, 74, 0.25);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #nome-corredor {
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(74, 222, 128, 0.35);
            background: rgba(2, 44, 34, 0.95);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        #card-evento {
            position: relative;
            width: 100%;
            aspect-ratio: 9 / 16;
            overflow: hidden;
            border-radius: 20px;
            background: #022c22;
            border: 1px solid rgba(74, 222, 128, 0.35);
        }

        /* 1. MOLDURA FLUTUANDO NA BASE DO CARD */
        #moldura-bg {
            position: absolute;
            inset: 0;
            background-image: url("fundo.png");
            background-size: cover;
            background-position: center;
            z-index: 1;
            pointer-events: none;
        }

        /* 2. ÁREA DA FOTO RECALIBRADA (BAIXADA E ESTICADA NA ALTURA) */
        #area-foto {
            position: absolute;
            top: 57%;    /* Baixou um pouco mais na área útil (era 55%) */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;  
            height: 38%; /* Esticou a altura vertical (era 32%) */
            z-index: 2;  
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            border-radius: 12px;
        }

        #foto-user {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            transition: transform 0.1s ease-out;
        }

        #foto-placeholder {
            position: absolute;
            inset: 0;
            background: rgba(2, 44, 34, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3;
            text-align: center;
            padding: 10px;
        }

        /* 3. TEXTO DO NOME NO TOPO ABSOLUTO */
        #texto-nome {
            position: absolute;
            bottom: 115px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            font-size: clamp(24px, 6vw, 36px);
            font-weight: 900;
            text-transform: uppercase;
            color: #ffffff;
            z-index: 10;
            text-shadow:
                2px 2px 0px #000,
                -2px 2px 0px #000,
                2px -2px 0px #000,
                -2px -2px 0px #000;
        }

        /* CONTROLES */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-label {
            display: block;
            text-align: center;
            background: #0f172a;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="file"] { display: none; }
        
        .control-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #4ade80;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
        }

        #btn-reset { background: #334155; color: white; }
        #btn-download { background: #16a34a; color: white; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Gere seu Card Oficial</h1>
        <p>Ajuste sua foto, digite seu nome e compartilhe nas redes!</p>
    </header>

    <main class="card-box">
        <div class="input-group">
            <input type="text" id="nome-corredor" placeholder="Digite seu nome completo" maxlength="25">
        </div>

        <div id="card-evento">
            <div id="moldura-bg"></div>
            
            <div id="area-foto">
                <img id="foto-user" alt="Sua foto de corredor" style="display: none;">
                <div id="foto-placeholder">
                    <span>📸</span>
                    <p>Toque abaixo para escolher uma foto</p>
                </div>
            </div>

            <div id="texto-nome">SEU NOME AQUI</div>
        </div>

        <div class="controls">
            <label class="file-label">
                1. Escolher Foto
                <input type="file" id="input-foto" accept="image/*">
            </label>

            <div class="control-item">
                <label for="slider-zoom">Zoom</label>
                <input type="range" id="slider-zoom" min="50" max="200" value="100" disabled>
            </div>

            <div class="action-buttons">
                <button id="btn-reset" type="button" disabled>Centralizar</button>
                <button id="btn-download" type="button">Salvar Card</button>
            </div>
        </div>
    </main>
</div>

<script>
    const inputFoto = document.getElementById('input-foto');
    const fotoUser = document.getElementById('foto-user');
    const fotoPlaceholder = document.getElementById('foto-placeholder');
    const nomeCorredor = document.getElementById('nome-corredor');
    const textoNome = document.getElementById('texto-nome');
    const sliderZoom = document.getElementById('slider-zoom');
    const btnReset = document.getElementById('btn-reset');
    const btnDownload = document.getElementById('btn-download');

    let currentScale = 1;

    nomeCorredor.addEventListener('input', (e) => {
        textoNome.textContent = e.target.value.toUpperCase().trim() || "SEU NOME AQUI";
    });

    inputFoto.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                fotoUser.src = event.target.result;
                fotoUser.style.display = 'block';
                fotoPlaceholder.style.display = 'none';
                
                sliderZoom.disabled = false;
                btnReset.disabled = false;
            }
            reader.readAsDataURL(file);
        }
    });

    sliderZoom.addEventListener('input', (e) => {
        currentScale = e.target.value / 100;
        fotoUser.style.transform = `scale(${currentScale})`;
    });

    btnReset.addEventListener('click', () => {
        currentScale = 1;
        sliderZoom.value = 100;
        fotoUser.style.transform = `scale(1)`;
    });

    btnDownload.addEventListener('click', () => {
        if(!inputFoto.files[0]) {
            alert("Por favor, selecione uma foto primeiro!");
            return;
        }

        const card = document.getElementById('card-evento');
        html2canvas(card, {
            useCORS: true,
            allowTaint: true,
            scale: 2 
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'meu-card-oficial.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    });
</script>
</body>
</html>
