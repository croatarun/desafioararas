<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Card Oficial - Ciclismo</title>
    <!-- Biblioteca para exportar a div como imagem -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 22px;
            font-family: Arial, sans-serif;
            color: white;
            overflow-x: hidden;
            background:
                radial-gradient(circle at top, rgba(74, 222, 128, 0.15), transparent 35%),
                radial-gradient(circle at center, rgba(34, 197, 94, 0.1), transparent 55%),
                linear-gradient(180deg, #022c22 0%, #064e3b 45%, #022c22 100%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: clamp(2rem, 8vw, 3.2rem);
            font-weight: 900;
            line-height: 1.15;
            color: #f8fafc;
            text-shadow: 0 0 18px rgba(74, 222, 128, 0.35);
        }

        header p {
            margin-top: 12px;
            color: #bbf7d0;
            font-size: 1.05rem;
            line-height: 1.4;
        }

        .card-box {
            width: 100%;
            padding: 20px;
            border-radius: 28px;
            background: rgba(2, 44, 34, 0.82);
            border: 1px solid rgba(74, 222, 128, 0.28);
            box-shadow: 0 0 35px rgba(22, 163, 74, 0.25);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #nome-corredor {
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(74, 222, 128, 0.35);
            background: rgba(2, 44, 34, 0.95);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        #card-evento {
            position: relative;
            width: 100%;
            aspect-ratio: 9 / 16;
            overflow: hidden;
            border-radius: 20px;
            background: #022c22;
            border: 1px solid rgba(74, 222, 128, 0.35);
        }

        /* 1. MOLDURA FLUTUANDO NA BASE DO CARD */
        #moldura-bg {
            position: absolute;
            inset: 0;
            background-image: url("fundo.png");
            background-size: cover;
            background-position: center;
            z-index: 1;
            pointer-events: none;
        }

        /* 2. ÁREA DA FOTO */
        #area-foto {
            position: absolute;
            top: 63%;      
            left: 50%;
            transform: translate(-50%, -50%);
            width: 84%;    
            height: 41%;   
            z-index: 2;  
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            border-radius: 14px;
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        #area-foto:active {
            cursor: grabbing;
        }

        #foto-user {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            transform: translate(0px, 0px) scale(1);
            transform-origin: center center;
            transition: transform 0.01s ease-out;
        }

        #foto-placeholder {
            position: absolute;
            inset: 0;
            background: rgba(2, 44, 34, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3;
            text-align: center;
            padding: 10px;
            pointer-events: none;
        }

        /* 3. TEXTO DO NOME (Mantido mais para baixo) */
        #texto-nome {
            position: absolute;
            bottom: 55px; 
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            font-size: clamp(24px, 6vw, 36px);
            font-weight: 900;
            text-transform: uppercase;
            color: #ffffff;
            z-index: 10;
            text-shadow:
                2px 2px 0px #000,
                -2px 2px 0px #000,
                2px -2px 0px #000,
                -2px -2px 0px #000;
        }

        /* CONTROLES */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-label {
            display: block;
            text-align: center;
            background: #0f172a;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="file"] { display: none; }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        button {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
        }

        #btn-reset { background: #334155; color: white; }
        #btn-download { background: #16a34a; color: white; }
        
        .instrucao-arrastar {
            text-align: center;
            font-size: 0.85rem;
            color: #a7f3d0;
            margin: 4px 0;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Gere seu Card Oficial</h1>
        <p>Ajuste sua foto, digite seu nome e compartilhe nas redes!</p>
    </header>

    <main class="card-box">
        <div class="input-group">
            <input type="text" id="nome-corredor" placeholder="Digite seu nome completo" maxlength="25">
        </div>

        <div id="card-evento">
            <div id="moldura-bg"></div>
            
            <div id="area-foto">
                <img id="foto-user" alt="Sua foto de corredor" style="display: none;">
                <div id="foto-placeholder">
                    <span>📸</span>
                    <p>Toque abaixo para escolher uma foto</p>
                </div>
            </div>

            <div id="texto-nome">SEU NOME AQUI</div>
        </div>

        <div class="controls">
            <label class="file-label">
                1. Escolher Foto
                <input type="file" id="input-foto" accept="image/*">
            </label>

            <p class="instrucao-arrastar" id="msg-ajuda" style="display:none;">
                👋 Use 1 dedo para mover | ✌️ Use 2 dedos (pinça) para dar zoom
            </p>

            <div class="action-buttons">
                <button id="btn-reset" type="button" disabled>Modificar Foto</button>
                <button id="btn-download" type="button">Salvar Card</button>
            </div>
        </div>
    </main>
</div>

<script>
    const inputFoto = document.getElementById('input-foto');
    const areaFoto = document.getElementById('area-foto');
    const fotoUser = document.getElementById('foto-user');
    const fotoPlaceholder = document.getElementById('foto-placeholder');
    const nomeCorredor = document.getElementById('nome-corredor');
    const textoNome = document.getElementById('texto-nome');
    const msgAjuda = document.getElementById('msg-ajuda');
    const btnReset = document.getElementById('btn-reset');
    const btnDownload = document.getElementById('btn-download');
    const cardEvento = document.getElementById('card-evento');

    let currentScale = 1;
    let currentTranslateX = 0;
    let currentTranslateY = 0;
    
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let initialPinchDistance = 0;
    let initialScale = 1;

    nomeCorredor.addEventListener('input', (e) => {
        textoNome.textContent = e.target.value.toUpperCase().trim() || "SEU NOME AQUI";
    });

    inputFoto.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                fotoUser.src = event.target.result;
                fotoUser.style.display = 'block';
                fotoPlaceholder.style.display = 'none';
                msgAjuda.style.display = 'block';
                
                currentScale = 1;
                currentTranslateX = 0;
                currentTranslateY = 0;
                aplicarTransformacoes();

                btnReset.disabled = false;
            }
            reader.readAsDataURL(file);
        }
    });

    function aplicarTransformacoes() {
        fotoUser.style.transform = `translate(${currentTranslateX}px, ${currentTranslateY}px) scale(${currentScale})`;
    }

    function getDistance(touch1, touch2) {
        return Math.hypot(touch2.clientX - touch1.clientX, touch2.clientY - touch1.clientY);
    }

    // --- ENTRADAS DE TOQUE (MOBILE GESTURES) ---
    areaFoto.addEventListener('touchstart', (e) => {
        if (!inputFoto.files[0]) return;
        if (e.touches.length === 1) {
            isDragging = true;
            startX = e.touches[0].clientX - (currentTranslateX * currentScale);
            startY = e.touches[0].clientY - (currentTranslateY * currentScale);
        } else if (e.touches.length === 2) {
            isDragging = false; 
            initialPinchDistance = getDistance(e.touches[0], e.touches[1]);
            initialScale = currentScale;
        }
    });

    window.addEventListener('touchmove', (e) => {
        if (!inputFoto.files[0]) return;
        if (e.touches.length === 1 && isDragging) {
            currentTranslateX = (e.touches[0].clientX - startX) / currentScale;
            currentTranslateY = (e.touches[0].clientY - startY) / currentScale;
            aplicarTransformacoes();
        } else if (e.touches.length === 2 && initialPinchDistance > 0) {
            const currentDistance = getDistance(e.touches[0], e.touches[1]);
            const factor = currentDistance / initialPinchDistance;
            currentScale = Math.min(Math.max(initialScale * factor, 0.4), 4);
            aplicarTransformacoes();
        }
    });

    window.addEventListener('touchend', (e) => {
        isDragging = false;
        if (e.touches.length < 2) initialPinchDistance = 0;
    });

    // --- ENTRADAS DE MOUSE (DESKTOP) ---
    areaFoto.addEventListener('mousedown', (e) => {
        if (!inputFoto.files[0]) return;
        isDragging = true;
        startX = e.clientX - (currentTranslateX * currentScale);
        startY = e.clientY - (currentTranslateY * currentScale);
    });

    window.addEventListener('mousemove', (e) => {
        if (isDragging) {
            currentTranslateX = (e.clientX - startX) / currentScale;
            currentTranslateY = (e.clientY - startY) / currentScale;
            aplicarTransformacoes();
        }
    });

    window.addEventListener('mouseup', () => { isDragging = false; });

    btnReset.addEventListener('click', () => {
        currentScale = 1;
        currentTranslateX = 0;
        currentTranslateY = 0;
        aplicarTransformacoes();
    });

    // --- MÉTODO DE DOWNLOAD DIRETO ATUALIZADO VIA BLOB (COMPATÍVEL COM CELULAR) ---
    btnDownload.addEventListener('click', () => {
        if(!inputFoto.files[0]) {
            alert("Por favor, selecione uma foto primeiro!");
            return;
        }

        btnDownload.innerText = "BAIXANDO...";
        btnDownload.disabled = true;

        // Executa a captura da área do card
        html2canvas(cardEvento, {
            useCORS: true,
            allowTaint: true,
            scale: 2, // Mantém a qualidade alta
            logging: false
        }).then(canvas => {
            // Conversão correta e limpa para formato Blob (Arquivo real binário)
            canvas.toBlob((blob) => {
                if (blob) {
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'meu-card-oficial.png';
                    
                    document.body.appendChild(link);
                    link.click();
                    
                    // Limpeza de cache pós-download
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                } else {
                    alert("Erro ao processar arquivo. Tente novamente.");
                }
                
                btnDownload.innerText = "SALVAR CARD";
                btnDownload.disabled = false;
            }, 'image/png');
        }).catch(error => {
            alert("Não foi possível gerar seu card. Verifique as permissões do seu navegador.");
            btnDownload.innerText = "SALVAR CARD";
            btnDownload.disabled = false;
        });
    });
</script>
</body>
</html>
