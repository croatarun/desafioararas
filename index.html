<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Card Oficial - Ciclismo</title>
    <!-- Biblioteca para exportar a div como imagem -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 22px;
            font-family: Arial, sans-serif;
            color: white;
            overflow-x: hidden;
            background:
                radial-gradient(circle at top, rgba(74, 222, 128, 0.15), transparent 35%),
                radial-gradient(circle at center, rgba(34, 197, 94, 0.1), transparent 55%),
                linear-gradient(180deg, #022c22 0%, #064e3b 45%, #022c22 100%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: clamp(2rem, 8vw, 3.2rem);
            font-weight: 900;
            line-height: 1.15;
            color: #f8fafc;
            text-shadow: 0 0 18px rgba(74, 222, 128, 0.35);
        }

        header p {
            margin-top: 12px;
            color: #bbf7d0;
            font-size: 1.05rem;
            line-height: 1.4;
        }

        .card-box {
            width: 100%;
            padding: 20px;
            border-radius: 28px;
            background: rgba(2, 44, 34, 0.82);
            border: 1px solid rgba(74, 222, 128, 0.28);
            box-shadow: 0 0 35px rgba(22, 163, 74, 0.25);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #nome-corredor {
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(74, 222, 128, 0.35);
            background: rgba(2, 44, 34, 0.95);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        #card-evento {
            position: relative;
            width: 100%;
            aspect-ratio: 9 / 16;
            overflow: hidden;
            border-radius: 20px;
            background: #022c22;
            border: 1px solid rgba(74, 222, 128, 0.35);
        }

        /* 1. MOLDURA FLUTUANDO NA BASE DO CARD */
        #moldura-bg {
            position: absolute;
            inset: 0;
            background-image: url("fundo.png");
            background-size: cover;
            background-position: center;
            z-index: 1;
            pointer-events: none;
        }

        /* 2. ÁREA DA FOTO COM TAMANHO E POSIÇÃO FIXOS (Protegendo o topo) */
        #area-foto {
            position: absolute;
            top: 61.5%;    /* Centralizado perfeitamente abaixo do Atleta Confirmado */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 84%;    /* Largura fixa baseada no seu layout */
            height: 43%;   /* Altura fixa controlada para não invadir textos superiores */
            z-index: 2;  
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            border-radius: 14px;
            cursor: grab;
            user-select: none;
            touch-action: none;
        }

        #area-foto:active {
            cursor: grabbing;
        }

        /* Preenchimento inteligente e responsivo às transformações manuais */
        #foto-user {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            transform: translate(0px, 0px) scale(1);
            transform-origin: center center;
            transition: transform 0.02s ease-out;
        }

        #foto-placeholder {
            position: absolute;
            inset: 0;
            background: rgba(2, 44, 34, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3;
            text-align: center;
            padding: 10px;
            pointer-events: none;
        }

        /* 3. TEXTO DO NOME */
        #texto-nome {
            position: absolute;
            bottom: 75px; 
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            font-size: clamp(24px, 6vw, 36px);
            font-weight: 900;
            text-transform: uppercase;
            color: #ffffff;
            z-index: 10;
            text-shadow:
                2px 2px 0px #000,
                -2px 2px 0px #000,
                2px -2px 0px #000,
                -2px -2px 0px #000;
        }

        /* CONTROLES */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-label {
            display: block;
            text-align: center;
            background: #0f172a;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="file"] { display: none; }
        
        .control-item {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 10px;
        }

        .control-item label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .zoom-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-zoom {
            background: #334155;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            user-select: none;
        }

        .btn-zoom:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        input[type="range"] {
            flex: 1;
            accent-color: #4ade80;
            height: 6px;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
        }

        #btn-reset { background: #334155; color: white; }
        #btn-download { background: #16a34a; color: white; }
        
        .instrucao-arrastar {
            text-align: center;
            font-size: 0.8rem;
            color: #a7f3d0;
            margin-top: -4px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Gere seu Card Oficial</h1>
        <p>Ajuste sua foto, digite seu nome e compartilhe nas redes!</p>
    </header>

    <main class="card-box">
        <div class="input-group">
            <input type="text" id="nome-corredor" placeholder="Digite seu nome completo" maxlength="25">
        </div>

        <div id="card-evento">
            <div id="moldura-bg"></div>
            
            <div id="area-foto">
                <img id="foto-user" alt="Sua foto de corredor" style="display: none;">
                <div id="foto-placeholder">
                    <span>📸</span>
                    <p>Toque abaixo para escolher uma foto</p>
                </div>
            </div>

            <div id="texto-nome">SEU NOME AQUI</div>
        </div>

        <div class="controls">
            <label class="file-label">
                1. Escolher Foto
                <input type="file" id="input-foto" accept="image/*">
            </label>

            <div class="control-item">
                <label for="slider-zoom">Zoom da Foto</label>
                <div class="zoom-container">
                    <button type="button" class="btn-zoom" id="btn-zoom-out" disabled>-</button>
                    <input type="range" id="slider-zoom" min="50" max="300" value="100" step="2" disabled>
                    <button type="button" class="btn-zoom" id="btn-zoom-in" disabled>+</button>
                </div>
            </div>
            <p class="instrucao-arrastar" id="msg-ajuda" style="display:none;">💡 Dica: Arraste a foto livremente com o dedo para os lados ou cima/baixo</p>

            <div class="action-buttons">
                <button id="btn-reset" type="button" disabled>Centralizar</button>
                <button id="btn-download" type="button">Salvar Card</button>
            </div>
        </div>
    </main>
</div>

<script>
    const inputFoto = document.getElementById('input-foto');
    const areaFoto = document.getElementById('area-foto');
    const fotoUser = document.getElementById('foto-user');
    const fotoPlaceholder = document.getElementById('foto-placeholder');
    const nomeCorredor = document.getElementById('nome-corredor');
    const textoNome = document.getElementById('texto-nome');
    const msgAjuda = document.getElementById('msg-ajuda');
    
    const sliderZoom = document.getElementById('slider-zoom');
    const btnZoomIn = document.getElementById('btn-zoom-in');
    const btnZoomOut = document.getElementById('btn-zoom-out');
    const btnReset = document.getElementById('btn-reset');
    const btnDownload = document.getElementById('btn-download');

    // Estados de transformação
    let currentScale = 1;
    let currentTranslateX = 0;
    let currentTranslateY = 0;
    
    let isDragging = false;
    let startX = 0;
    let startY = 0;

    nomeCorredor.addEventListener('input', (e) => {
        textoNome.textContent = e.target.value.toUpperCase().trim() || "SEU NOME AQUI";
    });

    inputFoto.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                fotoUser.src = event.target.result;
                fotoUser.style.display = 'block';
                fotoPlaceholder.style.display = 'none';
                msgAjuda.style.display = 'block';
                
                // Reinicia posições ao carregar nova foto
                currentScale = 1;
                currentTranslateX = 0;
                currentTranslateY = 0;
                sliderZoom.value = 100;
                aplicarTransformacoes();

                sliderZoom.disabled = false;
                btnZoomIn.disabled = false;
                btnZoomOut.disabled = false;
                btnReset.disabled = false;
            }
            reader.readAsDataURL(file);
        }
    });

    function aplicarTransformacoes() {
        // Executa translação X e Y combinada perfeitamente com a escala do zoom
        fotoUser.style.transform = `translate(${currentTranslateX}px, ${currentTranslateY}px) scale(${currentScale})`;
    }

    // REGULAGEM MANUAL 2D COMPLETA (DEDO OU MOUSE)
    function iniciarArrasto(x, y) {
        if (!inputFoto.files[0]) return;
        isDragging = true;
        
        // Compensação baseada na escala atual para evitar saltos bruscos
        startX = x - (currentTranslateX * currentScale);
        startY = y - (currentTranslateY * currentScale);
    }

    function moverArrasto(x, y) {
        if (!isDragging) return;
        
        currentTranslateX = (x - startX) / currentScale;
        currentTranslateY = (y - startY) / currentScale;
        aplicarTransformacoes();
    }

    function finalizarArrasto() {
        isDragging = false;
    }

    // Eventos Mouse (Desktop)
    areaFoto.addEventListener('mousedown', (e) => iniciarArrasto(e.clientX, e.clientY));
    window.addEventListener('mousemove', (e) => moverArrasto(e.clientX, e.clientY));
    window.addEventListener('mouseup', finalizarArrasto);

    // Eventos Touch (Mobile)
    areaFoto.addEventListener('touchstart', (e) => {
        iniciarArrasto(e.touches[0].clientX, e.touches[0].clientY);
    });
    window.addEventListener('touchmove', (e) => {
        moverArrasto(e.touches[0].clientX, e.touches[0].clientY);
    });
    window.addEventListener('touchend', finalizarArrasto);


    // Controles adicionais de Zoom via Slider
    sliderZoom.addEventListener('input', (e) => {
        currentScale = e.target.value / 100;
        aplicarTransformacoes();
    });

    btnZoomOut.addEventListener('click', () => {
        let novoValor = parseInt(sliderZoom.value) - 10;
        if (novoValor >= parseInt(sliderZoom.min)) {
            sliderZoom.value = novoValor;
            currentScale = novoValor / 100;
            aplicarTransformacoes();
        }
    });

    btnZoomIn.addEventListener('click', () => {
        let novoValor = parseInt(sliderZoom.value) + 10;
        if (novoValor <= parseInt(sliderZoom.max)) {
            sliderZoom.value = novoValor;
            currentScale = novoValor / 100;
            aplicarTransformacoes();
        }
    });

    btnReset.addEventListener('click', () => {
        currentScale = 1;
        currentTranslateX = 0;
        currentTranslateY = 0;
        sliderZoom.value = 100;
        aplicarTransformacoes();
    });

    btnDownload.addEventListener('click', () => {
        if(!inputFoto.files[0]) {
            alert("Por favor, selecione uma foto primeiro!");
            return;
        }

        const card = document.getElementById('card-evento');
        html2canvas(card, {
            useCORS: true,
            allowTaint: true,
            scale: 2 
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'meu-card-oficial.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    });
</script>
</body>
</html>
