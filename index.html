<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Card Oficial - Ciclismo</title>
    <!-- Biblioteca para exportar a div como imagem -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 22px;
            font-family: Arial, sans-serif;
            color: white;
            overflow-x: hidden;
            background:
                radial-gradient(circle at top, rgba(74, 222, 128, 0.15), transparent 35%),
                radial-gradient(circle at center, rgba(34, 197, 94, 0.1), transparent 55%),
                linear-gradient(180deg, #022c22 0%, #064e3b 45%, #022c22 100%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: clamp(2rem, 8vw, 3.2rem);
            font-weight: 900;
            line-height: 1.15;
            color: #f8fafc;
            text-shadow: 0 0 18px rgba(74, 222, 128, 0.35);
        }

        header p {
            margin-top: 12px;
            color: #bbf7d0;
            font-size: 1.05rem;
            line-height: 1.4;
        }

        .card-box {
            width: 100%;
            padding: 20px;
            border-radius: 28px;
            background: rgba(2, 44, 34, 0.82);
            border: 1px solid rgba(74, 222, 128, 0.28);
            box-shadow: 0 0 35px rgba(22, 163, 74, 0.25);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #nome-corredor {
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(74, 222, 128, 0.35);
            background: rgba(2, 44, 34, 0.95);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        #card-evento {
            position: relative;
            width: 100%;
            aspect-ratio: 9 / 16;
            overflow: hidden;
            border-radius: 20px;
            background: #022c22;
            border: 1px solid rgba(74, 222, 128, 0.35);
        }

        /* 1. MOLDURA FLUTUANDO NA BASE DO CARD */
        #moldura-bg {
            position: absolute;
            inset: 0;
            background-image: url("fundo.png");
            background-size: cover;
            background-position: center;
            z-index: 1;
            pointer-events: none;
        }

        /* 2. ÁREA DA FOTO */
        #area-foto {
            position: absolute;
            top: 63%;      
            left: 50%;
            transform: translate(-50%, -50%);
            width: 84%;    
            height: 41%;   
            z-index: 2;  
            overflow: hidden; 
            border-radius: 14px;
            cursor: grab;
            user-select: none;
            touch-action: none;
            background: #011410;
        }

        #area-foto:active {
            cursor: grabbing;
        }

        /* Mudança crucial: Posicionamento absoluto via propriedades top/left reais */
        #foto-user {
            position: absolute;
            top: 0px;
            left: 0px;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        #foto-placeholder {
            position: absolute;
            inset: 0;
            background: rgba(2, 44, 34, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3;
            text-align: center;
            padding: 10px;
            pointer-events: none;
        }

        /* 3. TEXTO DO NOME */
        #texto-nome {
            position: absolute;
            bottom: 55px; 
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            font-size: clamp(24px, 6vw, 36px);
            font-weight: 900;
            text-transform: uppercase;
            color: #ffffff;
            z-index: 10;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-shadow:
                2px 2px 0px #000,
                -2px 2px 0px #000,
                2px -2px 0px #000,
                -2px -2px 0px #000;
        }

        /* CONTROLES */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-label {
            display: block;
            text-align: center;
            background: #0f172a;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="file"] { display: none; }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        button {
            flex: 1;
            padding: 14px 10px;
            border-radius: 12px;
            border: none;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.9rem;
        }

        #btn-download { background: #16a34a; color: white; }
        #btn-view { background: #475569; color: white; }
        
        .instrucao-arrastar {
            text-align: center;
            font-size: 0.85rem;
            color: #a7f3d0;
            margin: 4px 0;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Gere seu Card Oficial</h1>
        <p>Ajuste sua foto, digite seu nome e compartilhe nas redes!</p>
    </header>

    <main class="card-box">
        <div class="input-group">
            <input type="text" id="nome-corredor" placeholder="Digite seu nome completo" maxlength="25">
        </div>

        <div id="card-evento">
            <div id="moldura-bg"></div>
            
            <div id="area-foto">
                <img id="foto-user" alt="Sua foto de corredor" style="display: none;">
                <div id="foto-placeholder">
                    <span>📸</span>
                    <p>Toque abaixo para escolher uma foto</p>
                </div>
            </div>

            <div id="texto-nome">SEU NOME AQUI</div>
        </div>

        <div class="controls">
            <label class="file-label">
                1. Escolher Foto
                <input type="file" id="input-foto" accept="image/*">
            </label>

            <p class="instrucao-arrastar" id="msg-ajuda" style="display:none;">
                👋 Use 1 dedo para mover | ✌️ Use 2 dedos (pinça) para dar zoom
            </p>

            <div class="action-buttons">
                <button id="btn-download" type="button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                    Salvar
                </button>
                <button id="btn-view" type="button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>
                    Visualizar em Outra Aba
                </button>
            </div>
        </div>
    </main>
</div>

<script>
    const inputFoto = document.getElementById('input-foto');
    const areaFoto = document.getElementById('area-foto');
    const fotoUser = document.getElementById('foto-user');
    const fotoPlaceholder = document.getElementById('foto-placeholder');
    const nomeCorredor = document.getElementById('nome-corredor');
    const textoNome = document.getElementById('texto-nome');
    const msgAjuda = document.getElementById('msg-ajuda');
    const btnDownload = document.getElementById('btn-download');
    const btnView = document.getElementById('btn-view');
    const cardEvento = document.getElementById('card-evento');

    // Estado interno usando dimensões absolutas em vez de transform dinâmico
    let imgWidth = 0;
    let imgHeight = 0;
    let imgLeft = 0;
    let imgTop = 0;
    
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let initialPinchDistance = 0;
    let baseWidth = 0;
    let baseHeight = 0;

    nomeCorredor.addEventListener('input', (e) => {
        textoNome.textContent = e.target.value.toUpperCase().trim() || "SEU NOME AQUI";
    });

    inputFoto.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                fotoUser.src = event.target.result;
                fotoUser.style.display = 'block';
                fotoPlaceholder.style.display = 'none';
                msgAjuda.style.display = 'block';
                
                // Aguarda carregar as proporções originais da imagem
                fotoUser.onload = function() {
                    const containerWidth = areaFoto.clientWidth;
                    const containerHeight = areaFoto.clientHeight;
                    
                    // Reseta tamanho mantendo o aspecto 'cover' inicial
                    imgWidth = containerWidth;
                    imgHeight = (fotoUser.naturalHeight / fotoUser.naturalWidth) * containerWidth;
                    
                    if(imgHeight < containerHeight) {
                        imgHeight = containerHeight;
                        imgWidth = (fotoUser.naturalWidth / fotoUser.naturalHeight) * containerHeight;
                    }
                    
                    imgLeft = (containerWidth - imgWidth) / 2;
                    imgTop = (containerHeight - imgHeight) / 2;
                    
                    atualizarDimensoes();
                }
            }
            reader.readAsDataURL(file);
        }
    });

    function atualizarDimensoes() {
        fotoUser.style.width = `${imgWidth}px`;
        fotoUser.style.height = `${imgHeight}px`;
        fotoUser.style.left = `${imgLeft}px`;
        fotoUser.style.top = `${imgTop}px`;
    }

    function getDistance(touch1, touch2) {
        return Math.hypot(touch2.clientX - touch1.clientX, touch2.clientY - touch1.clientY);
    }

    // --- ARRASTAR E ZOOM MOBILE (SEM CSS TRANSFORM) ---
    areaFoto.addEventListener('touchstart', (e) => {
        if (!inputFoto.files[0]) return;
        if (e.touches.length === 1) {
            isDragging = true;
            startX = e.touches[0].clientX - imgLeft;
            startY = e.touches[0].clientY - imgTop;
        } else if (e.touches.length === 2) {
            isDragging = false; 
            initialPinchDistance = getDistance(e.touches[0], e.touches[1]);
            baseWidth = imgWidth;
            baseHeight = imgHeight;
            startX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - imgLeft;
            startY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - imgTop;
        }
    });

    window.addEventListener('touchmove', (e) => {
        if (!inputFoto.files[0]) return;
        if (e.touches.length === 1 && isDragging) {
            imgLeft = e.touches[0].clientX - startX;
            imgTop = e.touches[0].clientY - startY;
            atualizarDimensoes();
        } else if (e.touches.length === 2 && initialPinchDistance > 0) {
            const currentDistance = getDistance(e.touches[0], e.touches[1]);
            const factor = currentDistance / initialPinchDistance;
            
            const novoWidth = Math.min(Math.max(baseWidth * factor, 80), 2000);
            const novoHeight = (baseHeight / baseWidth) * novoWidth;
            
            // Ajusta o ponto focal do zoom no centro dos dois dedos
            const centroX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const centroY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            
            imgLeft = centroX - ((centroX - imgLeft) * (novoWidth / imgWidth));
            imgTop = centroY - ((centroY - imgTop) * (novoHeight / imgHeight));
            
            imgWidth = novoWidth;
            imgHeight = novoHeight;
            atualizarDimensoes();
        }
    });

    window.addEventListener('touchend', (e) => {
        isDragging = false;
        if (e.touches.length < 2) initialPinchDistance = 0;
    });

    // --- VERSÃO PARA MOUSE ---
    areaFoto.addEventListener('mousedown', (e) => {
        if (!inputFoto.files[0]) return;
        isDragging = true;
        startX = e.clientX - imgLeft;
        startY = e.clientY - imgTop;
    });

    window.addEventListener('mousemove', (e) => {
        if (isDragging) {
            imgLeft = e.clientX - startX;
            imgTop = e.clientY - startY;
            atualizarDimensoes();
        }
    });

    window.addEventListener('mouseup', () => { isDragging = false; });

    // --- PROCESSO DE CAPTURA DE ALTA QUALIDADE ---
    function gerarCanvas(callback) {
        html2canvas(cardEvento, {
            scale: 3, // Força a renderização em 3x Ultra HD
            useCORS: true,
            allowTaint: false,
            backgroundColor: null,
            logging: false,
            imageTimeout: 0
        }).then(canvas => {
            callback(canvas);
        }).catch(err => {
            alert("Erro ao renderizar imagem.");
            btnDownload.disabled = false;
            btnView.disabled = false;
        });
    }

    // AÇÃO 1: BAIXAR DIRETO
    btnDownload.addEventListener('click', () => {
        if(!inputFoto.files[0]) {
            alert("Por favor, selecione uma foto primeiro!");
            return;
        }

        btnDownload.disabled = true;
        btnDownload.innerText = "AGUARDE...";

        gerarCanvas((canvas) => {
            canvas.toBlob((blob) => {
                if (blob) {
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'meu-card-oficial.png';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                }
                btnDownload.disabled = false;
                btnDownload.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> Salvar`;
            }, 'image/png', 1.0);
        });
    });

    // AÇÃO 2: VISUALIZAR EM OUTRA ABA
    btnView.addEventListener('click', () => {
        if(!inputFoto.files[0]) {
            alert("Por favor, selecione uma foto primeiro!");
            return;
        }

        btnView.disabled = true;
        btnView.innerText = "ABRINDO...";

        gerarCanvas((canvas) => {
            const imgData = canvas.toDataURL('image/png', 1.0);
            const novaAba = window.open();
            if(novaAba) {
                novaAba.document.write(`<html lang="pt-BR"><head><title>Card Oficial</title><style>body{margin:0;background:#022c22;display:flex;justify-content:center;align-items:center;min-height:100vh;}img{max-width:100%;max-height:100vh;box-shadow:0 0 30px rgba(0,0,0,0.5);}</style></head><body><img src="${imgData}" /></body></html>`);
                novaAba.document.close();
            } else {
                alert("O bloqueador de pop-ups do seu navegador impediu a abertura. Use o botão Salvar.");
            }
            btnView.disabled = false;
            btnView.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg> Visualizar em Outra Aba`;
        });
    });
</script>
</body>
</html>
