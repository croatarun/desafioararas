<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Card Oficial - Ciclismo</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 22px;
            font-family: Arial, sans-serif;
            color: white;
            overflow-x: hidden;
            background:
                radial-gradient(circle at top, rgba(74, 222, 128, 0.15), transparent 35%),
                radial-gradient(circle at center, rgba(34, 197, 94, 0.1), transparent 55%),
                linear-gradient(180deg, #022c22 0%, #064e3b 45%, #022c22 100%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: clamp(2rem, 8vw, 3.2rem);
            font-weight: 900;
            line-height: 1.15;
            color: #f8fafc;
            text-shadow: 0 0 18px rgba(74, 222, 128, 0.35);
        }

        header p {
            margin-top: 12px;
            color: #bbf7d0;
            font-size: 1.05rem;
            line-height: 1.4;
        }

        .card-box {
            width: 100%;
            padding: 20px;
            border-radius: 28px;
            background: rgba(2, 44, 34, 0.82);
            border: 1px solid rgba(74, 222, 128, 0.28);
            box-shadow: 0 0 35px rgba(22, 163, 74, 0.25);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #nome-corredor {
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(74, 222, 128, 0.35);
            background: rgba(2, 44, 34, 0.95);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        #card-evento {
            position: relative;
            width: 100%;
            aspect-ratio: 9 / 16;
            overflow: hidden;
            border-radius: 20px;
            background: #022c22;
            border: 1px solid rgba(74, 222, 128, 0.35);
        }

        /* 1. MOLDURA FLUTUANDO NA BASE DO CARD */
        #moldura-bg {
            position: absolute;
            inset: 0;
            background-image: url("fundo.png");
            background-size: cover;
            background-position: center;
            z-index: 1;
            pointer-events: none;
        }

        /* 2. ÁREA DA FOTO */
        #area-foto {
            position: absolute;
            top: 63%;      
            left: 50%;
            transform: translate(-50%, -50%);
            width: 84%;    
            height: 41%;   
            z-index: 2;  
            overflow: hidden; 
            border-radius: 14px;
            cursor: grab;
            user-select: none;
            touch-action: none;
            background: #011410;
        }

        #area-foto:active {
            cursor: grabbing;
        }

        #foto-user {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            transform-origin: center center;
        }

        #foto-placeholder {
            position: absolute;
            inset: 0;
            background: rgba(2, 44, 34, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3;
            text-align: center;
            padding: 10px;
            pointer-events: none;
        }

        /* 3. TEXTO DO NOME */
        #texto-nome {
            position: absolute;
            bottom: 55px; 
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            font-size: clamp(24px, 6vw, 36px);
            font-weight: 900;
            text-transform: uppercase;
            color: #ffffff;
            z-index: 10;
            text-shadow:
                2px 2px 0px #000,
                -2px 2px 0px #000,
                2px -2px 0px #000,
                -2px -2px 0px #000;
        }

        /* CONTROLES */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-label {
            display: block;
            text-align: center;
            background: #0f172a;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="file"] { display: none; }
        
        .btn-download {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            background: #16a34a;
            color: white;
            font-size: 1rem;
        }
        
        .instrucao-arrastar {
            text-align: center;
            font-size: 0.85rem;
            color: #a7f3d0;
            margin: 4px 0;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Gere seu Card Oficial</h1>
        <p>Ajuste sua foto, digite seu nome e salve o card!</p>
    </header>

    <main class="card-box">
        <div class="input-group">
            <input type="text" id="nome-corredor" placeholder="Digite seu nome completo" maxlength="25">
        </div>

        <div id="card-evento">
            <div id="moldura-bg"></div>
            
            <div id="area-foto">
                <img id="foto-user" alt="Sua foto de corredor" style="display: none;">
                <div id="foto-placeholder">
                    <span>📸</span>
                    <p>Toque abaixo para escolher uma foto</p>
                </div>
            </div>

            <div id="texto-nome">SEU NOME AQUI</div>
        </div>

        <div class="controls">
            <label class="file-label">
                1. Escolher Foto
                <input type="file" id="input-foto" accept="image/*">
            </label>

            <p class="instrucao-arrastar" id="msg-ajuda" style="display:none;">
                👋 Use 1 dedo para mover | ✌️ Use 2 dedos para dar zoom
            </p>

            <button class="btn btn-download" id="btnDownload">2. Baixar Story</button>
        </div>
    </main>
</div>

<script>
    const inputFoto = document.getElementById('input-foto');
    const areaFoto = document.getElementById('area-foto');
    const fotoUser = document.getElementById('foto-user');
    const fotoPlaceholder = document.getElementById('foto-placeholder');
    const nomeCorredor = document.getElementById('nome-corredor');
    const textoNome = document.getElementById('texto-nome');
    const msgAjuda = document.getElementById('msg-ajuda');
    const btnDownload = document.getElementById('btnDownload');

    // Variáveis de controle de zoom/posição na tela
    let scale = 1;
    let translateX = 0;
    let translateY = 0;
    
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let initialPinchDistance = 0;
    let initialScale = 1;

    nomeCorredor.addEventListener('input', (e) => {
        textoNome.textContent = e.target.value.toUpperCase().trim() || "SEU NOME AQUI";
    });

    inputFoto.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                fotoUser.src = event.target.result;
                fotoUser.style.display = 'block';
                fotoPlaceholder.style.display = 'none';
                msgAjuda.style.display = 'block';
                
                scale = 1;
                translateX = 0;
                translateY = 0;
                atualizarCSS();
            }
            reader.readAsDataURL(file);
        }
    });

    function atualizarCSS() {
        fotoUser.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    function getDistance(touch1, touch2) {
        return Math.hypot(touch2.clientX - touch1.clientX, touch2.clientY - touch1.clientY);
    }

    // --- INTERAÇÕES DE ARRASTAR E ZOOM ---
    areaFoto.addEventListener('touchstart', (e) => {
        if (!inputFoto.files[0]) return;
        if (e.touches.length === 1) {
            isDragging = true;
            startX = e.touches[0].clientX - translateX;
            startY = e.touches[0].clientY - translateY;
        } else if (e.touches.length === 2) {
            isDragging = false; 
            initialPinchDistance = getDistance(e.touches[0], e.touches[1]);
            initialScale = scale;
        }
    });

    window.addEventListener('touchmove', (e) => {
        if (!inputFoto.files[0]) return;
        if (e.touches.length === 1 && isDragging) {
            translateX = e.touches[0].clientX - startX;
            translateY = e.touches[0].clientY - startY;
            atualizarCSS();
        } else if (e.touches.length === 2 && initialPinchDistance > 0) {
            const currentDistance = getDistance(e.touches[0], e.touches[1]);
            const factor = currentDistance / initialPinchDistance;
            scale = Math.min(Math.max(initialScale * factor, 0.4), 5);
            atualizarCSS();
        }
    });

    window.addEventListener('touchend', () => { isDragging = false; initialPinchDistance = 0; });
    
    areaFoto.addEventListener('mousedown', (e) => {
        if (!inputFoto.files[0]) return;
        isDragging = true;
        startX = e.clientX - translateX;
        startY = e.clientY - translateY;
    });
    window.addEventListener('mousemove', (e) => {
        if (isDragging) {
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            atualizarCSS();
        }
    });
    window.addEventListener('mouseup', () => { isDragging = false; });

    // --- FUNÇÃO DE ARREDONDAMENTO DO CANVAS NATIVA ---
    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    // --- NOVO MOTOR DE DOWNLOAD CANVAS COM REPRODUÇÃO MATRICIAL CORRETA ---
    btnDownload.onclick = () => {
        if (!inputFoto.files[0]) return alert("Selecione sua foto primeiro!");

        btnDownload.innerText = "PROCESSANDO...";
        btnDownload.disabled = true;

        // Configura o canvas em alta resolução (1080x1920)
        const canvas = document.createElement('canvas');
        canvas.width = 1080;
        canvas.height = 1920;
        const ctx = canvas.getContext('2d');

        const molduraImg = new Image();
        molduraImg.src = 'fundo.png';
        
        const atletaImg = new Image();
        atletaImg.src = fotoUser.src;

        molduraImg.onload = () => {
            // 1. Preenche o fundo básico com a cor padrão
            ctx.fillStyle = '#022c22';
            ctx.fillRect(0, 0, 1080, 1920);

            // 2. Caixa de recorte proporcional (84% larg, 41% alt) com base nos parâmetros originais
            const wBox = 1080 * 0.84; 
            const hBox = 1920 * 0.41; 
            const xBox = (1080 - wBox) / 2;
            const yBox = (1920 * 0.63) - (hBox / 2);

            ctx.save();
            drawRoundedRect(ctx, xBox, yBox, wBox, hBox, 42);
            ctx.clip();

            // Mapeia o tamanho em tela para capturar as proporções do object-fit: cover nativo
            const exibicaoW = areaFoto.clientWidth;
            const exibicaoH = areaFoto.clientHeight;
            const ratioW = exibicaoW / atletaImg.naturalWidth;
            const ratioH = exibicaoH / atletaImg.naturalHeight;
            const coverScale = Math.max(ratioW, ratioH);

            // Largura e altura da imagem se estivesse em object-fit: cover estático em relação à caixa
            const baseW = atletaImg.naturalWidth * coverScale;
            const baseH = atletaImg.naturalHeight * coverScale;

            // Fator multiplicador de conversão da tela para a resolução interna HD do Canvas (1080px)
            const fatorConversaoHD = 1080 / areaFoto.parentElement.clientWidth;

            // Transpõe a lógica exata de renderização do CSS (Center Origin + Translate + Scale) para o Canvas
            ctx.translate(xBox + wBox / 2, yBox + hBox / 2); // Vai ao centro da caixa
            ctx.translate(translateX * fatorConversaoHD, translateY * fatorConversaoHD); // Aplica o movimento do usuário
            ctx.scale(scale, scale); // Aplica o zoom do usuário

            // Desenha a imagem centralizada no novo ponto de origem matricial corrigido
            ctx.drawImage(atletaImg, -baseW / 2 * fatorConversaoHD, -baseH / 2 * fatorConversaoHD, baseW * fatorConversaoHD, baseH * fatorConversaoHD);
            ctx.restore();

            // 3. Desenha a sua moldura oficial por cima de tudo
            ctx.drawImage(molduraImg, 0, 0, 1080, 1920);

            // 4. Renderiza o texto nativamente com o contorno preto perfeito
            ctx.fillStyle = "#ffffff";
            ctx.font = "900 66px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            const xTexto = 1080 / 2;
            const yTexto = 1920 - 125; 

            ctx.strokeStyle = "#000000";
            ctx.lineWidth = 12;
            ctx.strokeText(textoNome.textContent, xTexto, yTexto);
            ctx.fillText(textoNome.textContent, xTexto, yTexto);

            // 5. Executa o download nativo via DataURL
            const link = document.createElement('a');
            link.download = 'Desafio_Araras_Story.png';
            link.href = canvas.toDataURL('image/png', 1.0);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            btnDownload.innerText = "2. Baixar Story";
            btnDownload.disabled = false;
        };

        molduraImg.onerror = () => {
            alert("Erro ao carregar 'fundo.png'. Certifique-se de que o arquivo está no mesmo diretório.");
            btnDownload.innerText = "2. Baixar Story";
            btnDownload.disabled = false;
        };
    };
</script>
</body>
</html>
